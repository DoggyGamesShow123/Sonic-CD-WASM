<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Sonic CD</title>

    <style type="text/css">
      html, body {
        font-family: arial, sans-serif;
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #000;
        text-align: center;
      }
      canvas {
        height: 100%;
        margin: auto;
        padding: 0;
        border: 0 none;
        background-color: #000;
        image-rendering: optimizeSpeed;
        image-rendering: -webkit-optimize-contrast;
        image-rendering: -moz-crisp-edges;
        image-rendering: -o-crisp-edges;
        image-rendering: crisp-edges;
        image-rendering: pixelated;
      }
      .spinner {
        height: 30px;
        width: 30px;
        margin: 20px 0 0 20px;
        display: inline-block;
        vertical-align: top;
        animation: rotation 0.8s linear infinite;
        border-left: 5px solid rgb(235, 235, 235);
        border-right: 5px solid rgb(235, 235, 235);
        border-bottom: 5px solid rgb(235, 235, 235);
        border-top: 5px solid rgb(120, 120, 120);
        border-radius: 100%;
        background-color: rgb(189, 215, 46);
      }
      @keyframes rotation {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      #status {
        display: inline-block;
        vertical-align: top;
        margin-top: 30px;
        margin-left: 20px;
        font-weight: bold;
        color: rgb(120, 120, 120);
      }
      #progress {
        height: 20px;
        width: 300px;
      }
      #output {
        width: 100%;
        height: 200px;
        margin: 10px auto 0;
        display: none; /* keep hidden */
        background-color: black;
        color: white;
        font-family: 'Lucida Console', Monaco, monospace;
        outline: none;
      }

      /* === In‑Page Dev Tools styles === */
      #devtools_toggle {
        position: fixed; z-index: 99998; right: 12px; bottom: 12px;
        background: #1f2937; color: #fff; border: 1px solid #374151; border-radius: 6px;
        padding: 8px 10px; font: 12px/1.2 system-ui, sans-serif; cursor: pointer; opacity: .85;
      }
      #devtools_toggle:hover { opacity: 1; }
      #devtools_panel {
        position: fixed; z-index: 99999; right: 12px; bottom: 52px; width: 460px; max-height: 72vh;
        background: #0b0f14; color: #e5e7eb; border: 1px solid #374151; border-radius: 8px;
        display: block; /* 🔛 ON by default */
        box-shadow: 0 10px 30px rgba(0,0,0,.5);
      }
      #devtools_header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 8px 10px; background: #111827; border-bottom: 1px solid #374151; cursor: move;
        user-select: none; border-top-left-radius: 8px; border-top-right-radius: 8px;
      }
      #devtools_body { padding: 8px 10px; overflow: auto; max-height: calc(72vh - 42px); }
      #devtools_body input, #devtools_body button, #devtools_body textarea {
        font: 12px/1.3 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      }
      .devtools-row { display: flex; gap: 6px; margin: 6px 0; flex-wrap: wrap; }
      .devtools-col { flex: 1 1 180px; min-width: 0; }
      .devtools-btn { background: #2563eb; color: #fff; border: 1px solid #1d4ed8; border-radius: 4px; padding: 5px 8px; cursor: pointer; }
      .devtools-btn.secondary { background: #374151; border-color: #4b5563; }
      .devtools-btn.danger { background: #dc2626; border-color: #b91c1c; }
      .devtools-input { background: #0b1220; color: #e5e7eb; border: 1px solid #374151; border-radius: 4px; padding: 5px 6px; width: 100%; box-sizing: border-box; }
